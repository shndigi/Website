<body class="bg-background text-on-surface font-body-md h-screen flex w-full overflow-hidden antialiased">
<!-- Split Layout Container -->
<div class="flex w-full h-full">
<!-- Left Visual Pane (Hidden on mobile) -->
<div class="hidden lg:block lg:w-1/2 relative bg-surface-container-highest overflow-hidden">
<img alt="Academic environment" class="absolute inset-0 w-full h-full object-cover" data-alt="abstract architectural detail of a modern university library interior with golden hour sunlight streaming through large windows casting long shadows across stone floors, conveying academic prestige and enlightened growth" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAasTSNkp4qwfDQi57ZamUrHSmH6rkuFu5aKhso_kft-Fl4gQJZrwcHkv2IBD1kLWrQod9WEet38KIjLYW_y-zNAQI7li45-sSvXNEgop53fG2-k9tdUhx0HAA-tCDGghgHBbu9T-RbUNqjm0fatdbbq0ylo3nXX8qpK8TnUJwXlBtr0GLJUn9AN7uG3eaolw7RE5-KfERcj80t_ilvKBhBCkNaneTitY5IqLPSzzJaI8mghRxi6LNJLT-6SffmcTJJ3kG64hkfZLB3"/>
<!-- Subtle gradient overlay to enhance brand tone -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/30 to-background/10 mix-blend-multiply"></div>
<!-- Optional branded watermark or quote could go here, keeping it clean for now -->
<div class="absolute bottom-12 left-12 max-w-md">
<p class="font-headline-md text-headline-md text-on-primary drop-shadow-md">
                    "Empowering enlightened growth through academic prestige."
                </p>
</div>
</div>
<!-- Right Form Pane -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-margin-desktop bg-surface-container-lowest overflow-y-auto">
<!-- Inner Form Container -->
<div class="w-full max-w-[440px] flex flex-col gap-10">
<!-- Header -->
<div class="flex flex-col gap-4">
<img alt="SHN Academy Logo" class="h-12 w-auto object-contain self-start mb-2" data-alt="SHN Academy brand logo featuring a stylized golden sun motif intersecting with deep purple geometric shapes, representing enlightened growth" src="https://lh3.googleusercontent.com/aida/ADBb0uj82RPiY9ykp0v3riYYTzQA88V1zGgl-WaA84sX8q3oeu1rnO31E7o07-LF8lTXJKwRjD19UXstZvZoxAhNqbPD5SyWD2CvKRmJz0UKXJu4-o3cMWt_i8dN6afgVVlFDf-JzSvJNrQ4H2Tf_6MQblJpHvMrAztKHk0pUrqCORaveyjV2WUJJELHmCwPKMUB4CmvuQq8cuAx2rxWpvhnJwgt7aZR5Jzr4wXsBFFVyNaw51pGoVqk8TpzPIUn8f9HOqXlJFKp3bRovmY"/>
<div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to access your learning dashboard.</p>
</div>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email Address</label>
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface-bright text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md" id="email" name="email" placeholder="student@shnacademy.edu" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface-bright text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-primary text-on-primary font-label-bold text-label-bold py-3.5 rounded-DEFAULT hover:bg-primary-container focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors flex justify-center items-center gap-2" type="submit">
                        Log In
                        <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="text-center mt-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-label-bold hover:underline transition-all" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</div>
